# Openbulls local Redis config
bind 127.0.0.1
protected-mode no
port 6379

# Persistence: AOF only (durable, restart-safe)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Keyspace notifications (used by BullMQ)
notify-keyspace-events Ex